<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест жүйесі</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .question {
            margin-bottom: 20px;
        }
        .variant {
            display: block;
            margin-bottom: 5px;
            cursor: pointer;
        }
        .question-result {
            font-weight: bold;
            margin-top: 10px;
        }
        .correct {
            color: green;
        }
        .incorrect {
            color: red;
        }
        .pagination {
            margin-top: 20px;
            text-align: center;
        }
        .pagination button {
            margin: 5px;
            padding: 10px;
            font-size: 16px;
        }
        .pagination button.active {
            background-color: #007bff;
            color: white;
            border-radius: 5px;
        }
        .shuffle-button {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .correct-answer {
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<h1>Тест</h1>

<div class="shuffle-button">
    <button onclick="shuffleQuestions()">Сұрақтарды араластыру</button>
    <button onclick="shuffleCurrentPageQuestions()">Бетті араластыру</button>
    <button onclick="showCorrectAnswers()">Дұрыс жауаптар</button>
    <button onclick="resetAll()">Қайта бастау</button>
</div>

<div id="quiz"></div>
<div class="pagination" id="pagination"></div>

<script>
let currentPage = 1;
const questionsPerPage = 30;
let allQuestions = [];

async function loadTest() {
    try {
        const response = await fetch('test.txt');
        const text = await response.text();

        const questions = text.split('~~').filter(q => q.trim());
        allQuestions = questions;

        renderPage(currentPage);
        renderPagination();
    } catch (error) {
        document.getElementById('quiz').textContent = 'Қате: ' + error.message;
    }
}

function renderPage(page) {
    const quizDiv = document.getElementById('quiz');
    quizDiv.innerHTML = '';

    const start = (page - 1) * questionsPerPage;
    const end = page * questionsPerPage;
    const pageQuestions = allQuestions.slice(start, end);

    pageQuestions.forEach((questionBlock, index) => {
        const lines = questionBlock.split('\n')
            .map(line => line.trim())
            .filter(line => line);

        if (lines.length < 2) return;

        const questionText = lines[0].replace(/^\d+\s*/, '');

        let correctVariant = null;

        const variants = lines.slice(1).map(line => {
            if (line.endsWith('+')) {
                const clean = line.replace('+', '').trim();
                correctVariant = clean;
                return clean;
            }
            return line.trim();
        });

        const allVariants = shuffleVariants(variants);
        const correctAnswerIndex = allVariants.indexOf(correctVariant);

        const questionDiv = document.createElement('div');
        questionDiv.classList.add('question');
        questionDiv.id = `q${start + index}`;

        const questionElem = document.createElement('p');
        questionElem.textContent = `${start + index + 1}. ${questionText}`;
        questionDiv.appendChild(questionElem);

        const labels = ['A', 'B', 'C', 'D', 'E'];

        allVariants.forEach((variant, vIndex) => {
            const label = document.createElement('label');
            label.classList.add('variant');

            label.innerHTML = `
                <input type="radio" name="q${start + index}" value="${vIndex === correctAnswerIndex ? 'correct' : 'wrong'}">
                ${labels[vIndex]}. ${variant}
            `;

            if (vIndex === correctAnswerIndex) {
                label.dataset.correct = true;
            }

            questionDiv.appendChild(label);
        });

        const checkButton = document.createElement('button');
        checkButton.textContent = 'Тексеру';
        checkButton.onclick = function () {
            checkAnswer(start + index);
        };

        const resultDiv = document.createElement('div');
        resultDiv.id = `result${start + index}`;
        questionDiv.appendChild(resultDiv);

        questionDiv.appendChild(checkButton);
        quizDiv.appendChild(questionDiv);
    });
}

function renderPagination() {
    const paginationDiv = document.getElementById('pagination');
    paginationDiv.innerHTML = '';

    const totalPages = Math.ceil(allQuestions.length / questionsPerPage);

    for (let i = 1; i <= totalPages; i++) {
        const button = document.createElement('button');
        button.textContent = i;

        if (i === currentPage) {
            button.classList.add('active');
        }

        button.onclick = () => {
            currentPage = i;
            renderPage(currentPage);
            renderPagination();
        };

        paginationDiv.appendChild(button);
    }
}

function shuffleVariants(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function shuffleQuestions() {
    allQuestions = shuffleVariants(allQuestions);
    currentPage = 1;
    renderPage(currentPage);
    renderPagination();
}

function shuffleCurrentPageQuestions() {
    const start = (currentPage - 1) * questionsPerPage;
    const end = start + questionsPerPage;

    const current = allQuestions.slice(start, end);
    const shuffled = shuffleVariants(current);

    allQuestions.splice(start, current.length, ...shuffled);
    renderPage(currentPage);
}

function checkAnswer(index) {
    const selected = document.querySelector(`input[name="q${index}"]:checked`);
    const resultDiv = document.getElementById(`result${index}`);

    if (!selected) {
        resultDiv.textContent = 'Жауап таңдаңыз!';
        resultDiv.style.color = 'orange';
        return;
    }

    if (selected.value === 'correct') {
        resultDiv.textContent = 'Дұрыс ✅';
        resultDiv.className = 'question-result correct';
    } else {
        resultDiv.textContent = 'Қате ❌';
        resultDiv.className = 'question-result incorrect';
    }
}

function showCorrectAnswers() {
    document.querySelectorAll('label[data-correct="true"]').forEach(el => {
        el.classList.add('correct-answer');
    });
}

function resetAll() {
    loadTest();
}

loadTest();
</script>

</body>
</html>
